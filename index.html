<!DOCTYPE html> 
<html lang="zh-TW"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>手機專業監控牆</title> 
    <style> 
        body { background-color: #000; margin: 0; padding: 0; color: #fff; font-family: sans-serif; } 
        .header { height: 40px; line-height: 40px; text-align: center; background: #131722; font-size: 14px; color: #00ffcc; border-bottom: 1px solid #333; } 
        .container { display: flex; flex-direction: column; width: 100vw; } 
        .chart-box { height: 300px; width: 100%; border-bottom: 2px solid #222; position: relative; } 
        .label { position: absolute; top: 5px; left: 10px; z-index: 10; font-size: 10px; color: rgba(255,255,255,0.5); pointer-events: none; } 
    </style> 
</head> 
<body> 
    <div class="header">🚀 全球實時數據監控 (1分K)</div> 
     
    <div class="container"> 
        <div class="chart-box"><span class="label">比特幣 BTC</span><div id="c1" style="height:100%;"></div></div> 
        <div class="chart-box"><span class="label">乙太幣 ETH</span><div id="c2" style="height:100%;"></div></div> 
        <div class="chart-box"><span class="label">黃金現貨 GOLD</span><div id="c3" style="height:100%;"></div></div> 
        <div class="chart-box"><span class="label">原油現貨 OIL</span><div id="c4" style="height:100%;"></div></div> 
        <div class="chart-box"><span class="label">Solana SOL</span><div id="c5" style="height:100%;"></div></div> 
        <div class="chart-box"><span class="label">BNB 幣</span><div id="c6" style="height:100%;"></div></div> 
        <div class="chart-box"><span class="label">瑞波幣 XRP</span><div id="c7" style="height:100%;"></div></div> 
        <div class="chart-box"><span class="label">比特幣現金 BCH</span><div id="c8" style="height:100%;"></div></div> 
    </div> 
 
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script> 
    <script type="text/javascript"> 
        function loadChart(id, symbol) { 
            new TradingView.widget({ 
                "autosize": true, "symbol": symbol, "interval": "1", 
                "timezone": "Asia/Taipei", "theme": "dark", "style": "1", 
                "locale": "zh_TW", "toolbar_bg": "#f1f3f6", 
                "enable_publishing": false, "hide_top_toolbar": false, 
                "save_image": false, "container_id": id 
            }); 
        } 
        // 依序加載 
        loadChart("c1", "BINANCE:BTCUSDT"); 
        loadChart("c2", "BINANCE:ETHUSDT"); 
        loadChart("c3", "TVC:GOLD"); 
        loadChart("c4", "TVC:USOIL"); 
        loadChart("c5", "BINANCE:SOLUSDT"); 
        loadChart("c6", "BINANCE:BNBUSDT"); 
        loadChart("c7", "BINANCE:XRPUSDT"); 
        loadChart("c8", "BINANCE:BCHUSDT"); 
    </script> 
</body> 
</html>
